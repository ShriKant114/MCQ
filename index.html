<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Study Portal | Flawless Compact</title>
    
    <!-- Clean Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* =========================================
           CSS VARIABLES (COMPACT PREMIUM THEMING)
           ========================================= */
        
        /* Dark Theme (Minimal Black) */
        :root {
            --bg-body: #050505;
            --bg-card: #111111;
            --bg-header: rgba(5, 5, 5, 0.85);
            --bg-ans: #1a1a1a;
            
            --border-main: #262626;
            --border-hover: #404040;
            
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            
            --accent: #ffffff;
            --accent-text: #000000;
        }

        /* Light Theme (Clean White) */
        [data-theme="light"] {
            --bg-body: #f9fafb;
            --bg-card: #ffffff;
            --bg-header: rgba(249, 250, 251, 0.85);
            --bg-ans: #f3f4f6;
            
            --border-main: #e5e7eb;
            --border-hover: #d1d5db;
            
            --text-main: #111827;
            --text-muted: #6b7280;
            
            --accent: #111827;
            --accent-text: #ffffff;
        }

        /* Hide scrollbar completely */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <script>
        // Tailwind config with custom variables
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        theme: {
                            body: 'var(--bg-body)', card: 'var(--bg-card)',
                            header: 'var(--bg-header)', ans: 'var(--bg-ans)',
                            main: 'var(--text-main)', muted: 'var(--text-muted)', 
                            border: 'var(--border-main)', borderHover: 'var(--border-hover)', 
                            accent: 'var(--accent)', accentText: 'var(--accent-text)'
                        }
                    }
                }
            }
        }
    </script>
</head>
<!-- Added flex and flex-col to keep footer at the bottom -->
<body class="bg-theme-body text-theme-main font-sans antialiased m-0 p-0 transition-colors duration-500 min-h-screen flex flex-col">

    <!-- Compact Premium Header -->
    <header class="sticky top-0 z-50 backdrop-blur-lg bg-theme-header border-b border-theme-border px-4 py-3 md:px-8 flex justify-between items-center transition-colors duration-500">
        <h1 class="m-0 text-base md:text-lg font-semibold tracking-wide flex items-center gap-2">
            <span class="text-theme-muted">📚</span> Study Portal
        </h1>
        
        <div class="flex items-center gap-3">
            <!-- Theme Toggle -->
            <button onclick="toggleTheme()" class="p-2 rounded-lg border border-theme-border text-theme-main hover:bg-theme-border transition-colors duration-300" title="Switch Theme">
                <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
            </button>

            <!-- Global Action -->
            <button id="globalToggleBtn" class="bg-theme-accent text-theme-accentText font-medium py-2 px-4 rounded-lg hover:opacity-90 transition-opacity text-xs md:text-sm shadow-sm" onclick="toggleAllAnswers()">
                Show All
            </button>
        </div>
    </header>

    <!-- Minimalist Navbar -->
    <div class="border-b border-theme-border flex overflow-x-auto gap-2 px-4 md:px-8 py-3 no-scrollbar transition-colors duration-500" id="navbar-container"></div>

    <!-- Main Content Area (flex-grow ensures it pushes footer down) -->
    <main class="flex-grow w-full">
        <!-- Quiz Container -->
        <div class="max-w-3xl mx-auto my-6 md:my-8 px-4" id="quiz-container"></div>
    </main>

    <!-- Premium Theme-Friendly Footer -->
    <footer class="w-full border-t border-theme-border py-4 px-4 mt-auto transition-colors duration-500 bg-theme-body">
        <div class="max-w-3xl mx-auto text-center">
            <p class="text-xs md:text-sm text-theme-muted flex items-center justify-center flex-wrap gap-1.5">
                Designed & developed by 
                <a href="https://shrikant.dev" target="_blank" rel="noopener noreferrer" class="text-theme-main font-medium hover:text-theme-accent hover:underline decoration-theme-muted underline-offset-4 transition-all duration-300">
                    Shrikant
                </a>
                with <span class="text-red-500 animate-pulse text-sm md:text-base mx-0.5">💖</span> in India.
            </p>
        </div>
    </footer>

    <script>
        let isAllShown = false;
        let selectedTopicIndex = 0;
        let quizData = {};

        // --- Theme Toggle ---
        function toggleTheme() {
            const htmlEl = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            
            if (htmlEl.getAttribute('data-theme') === 'light') {
                htmlEl.removeAttribute('data-theme');
                themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />`;
            } else {
                htmlEl.setAttribute('data-theme', 'light');
                themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />`;
            }
        }

        // --- Fetch Data ---
        async function loadData() {
            try {
                const response = await fetch('data.json');
                quizData = await response.json();
                renderNavbar();
                renderQuiz([quizData.topics[selectedTopicIndex]]);
            } catch (error) {
                document.getElementById('quiz-container').innerHTML = 
                    `<div class="p-4 border border-red-500/30 bg-red-500/10 rounded-lg text-center text-red-500 text-sm mt-8">Error: data.json Data loding Problem.</div>`;
            }
        }
        
        // --- Render Navbar ---
        function renderNavbar() {
            const navContainer = document.getElementById('navbar-container');
            navContainer.innerHTML = '';

            quizData.topics.forEach((topic, index) => {
                const tabBtn = document.createElement('button');
                let baseClasses = "px-4 py-1.5 rounded-md text-sm font-medium transition-colors cursor-pointer whitespace-nowrap ";
                if (index === selectedTopicIndex) {
                    tabBtn.className = baseClasses + "bg-theme-main text-theme-body"; 
                } else {
                    tabBtn.className = baseClasses + "bg-transparent text-theme-muted border border-theme-border hover:border-theme-borderHover hover:text-theme-main"; 
                }
                tabBtn.textContent = topic.topicName;
                tabBtn.onclick = () => switchTopic(index);
                navContainer.appendChild(tabBtn);
            });
        }

        // --- Switch Topic ---
        function switchTopic(topicIndex) {
            selectedTopicIndex = topicIndex;
            isAllShown = false; 
            renderNavbar(); 
            renderQuiz([quizData.topics[topicIndex]]); 
            document.getElementById('globalToggleBtn').textContent = 'Show All';
        }

        // --- Render Cards ---
        function renderQuiz(topics) {
            const container = document.getElementById('quiz-container');
            let htmlContent = '';

            topics.forEach((topic) => {
                htmlContent += `
                    <div class="mb-10 transition-colors duration-500">
                        <h2 class="text-xl md:text-2xl font-semibold text-theme-main mb-6 flex items-center gap-3">
                            <span class="w-6 h-[2px] bg-theme-accent block"></span>
                            ${topic.topicName}
                        </h2>
                `;

                topic.questions.forEach((item, qIndex) => {
                    htmlContent += `
                        <div class="bg-theme-card border border-theme-border rounded-xl p-4 md:p-5 mb-4 shadow-sm hover:border-theme-borderHover transition-colors duration-300">
                            
                            <!-- Question -->
                            <h3 class="text-sm md:text-base font-medium m-0 text-theme-main leading-snug">
                                <span class="text-theme-muted mr-2">Q${qIndex + 1}.</span>${item.q}
                            </h3>
                            
                            <!-- Inline Answer Wrapper -->
                            <div class="mt-3 answer-wrapper flex">
                                
                                <!-- View Answer Button -->
                                <button class="view-btn w-fit text-xs md:text-sm font-medium text-theme-muted border border-theme-border bg-theme-body px-3 py-1.5 rounded hover:text-theme-main hover:bg-theme-border transition-colors cursor-pointer select-none" onclick="toggleInlineAnswer(this)">
                                    View Answer
                                </button>
                                
                                <!-- Actual Answer Text -->
                                <div class="ans-text hidden w-fit max-w-full text-xs md:text-sm text-theme-main bg-theme-ans border border-theme-border rounded px-3 py-1.5 cursor-pointer select-none" onclick="toggleInlineAnswer(this)" title="Click to hide answer">
                                    <span class="font-semibold text-theme-muted mr-1">Ans:</span>${item.ans}
                                </div>

                            </div>
                        </div>
                    `;
                });

                htmlContent += `</div>`;
            });

            container.innerHTML = htmlContent;
        }

        // --- Inline Answer Toggle ---
        function toggleInlineAnswer(element) {
            const wrapper = element.closest('.answer-wrapper');
            const viewBtn = wrapper.querySelector('.view-btn');
            const ansText = wrapper.querySelector('.ans-text');
            
            if (ansText.classList.contains('hidden')) {
                ansText.classList.remove('hidden');
                viewBtn.classList.add('hidden');
            } else {
                ansText.classList.add('hidden');
                viewBtn.classList.remove('hidden');
            }
        }

        // --- Toggle All Answers ---
        function toggleAllAnswers() {
            isAllShown = !isAllShown;
            
            const wrappers = document.querySelectorAll('.answer-wrapper');
            const globalBtn = document.getElementById('globalToggleBtn');

            wrappers.forEach(wrapper => {
                const viewBtn = wrapper.querySelector('.view-btn');
                const ansText = wrapper.querySelector('.ans-text');
                
                if (isAllShown) {
                    ansText.classList.remove('hidden');
                    viewBtn.classList.add('hidden');
                } else {
                    ansText.classList.add('hidden');
                    viewBtn.classList.remove('hidden');
                }
            });

            globalBtn.textContent = isAllShown ? 'Hide All' : 'Show All';
        }

        window.onload = loadData;
    </script>
</body>
</html>
